description = "Scan git history for secrets that were committed and later removed"
prompt = "Run SecretKeeper history scan. Execute: node bin/secretkeeper.js history. Report secrets found in past commits (these persist in git history even after deletion). For each: commit SHA, secret type, redacted value. Recommend: rotate the secret immediately, use git filter-repo or BFG to purge history if still exposed, and add pre-commit scanning."
