description = "Show SecretKeeper commands and detection scope"
prompt = "List SecretKeeper commands and what it detects. Commands: /secretkeeper [lite|full|ultra|off], /secretkeeper-scan, /secretkeeper-audit, /secretkeeper-history. Detects: AWS keys, GitHub/GitLab tokens, OpenAI/Anthropic keys, Stripe/Twilio/SendGrid/Slack/npm tokens, Google API keys, Azure connection strings, JWT secrets, OAuth client secrets, hardcoded passwords, database URLs with credentials, private keys, generic API key assignments, high-entropy strings. Two layers: prompt prevention + deterministic scanner. CLI: node bin/secretkeeper.js [scan|audit|history]."
